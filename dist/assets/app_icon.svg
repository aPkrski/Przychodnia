<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="white" rx="60"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="medicalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="financeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left circle - Medical (Blue) -->
  <circle cx="80" cy="100" r="50" fill="url(#medicalGradient)" opacity="0.95"/>
  
  <!-- Right circle - Finance (Green) -->
  <circle cx="176" cy="140" r="50" fill="url(#financeGradient)" opacity="0.95"/>
  
  <!-- Medical cross inside left circle -->
  <g transform="translate(80, 100)">
    <!-- Vertical bar -->
    <rect x="-8" y="-24" width="16" height="48" fill="white" rx="4"/>
    <!-- Horizontal bar -->
    <rect x="-24" y="-8" width="48" height="16" fill="white" rx="4"/>
  </g>
  
  <!-- Financial chart/bars inside right circle -->
  <g transform="translate(176, 140)">
    <!-- Bar 1 - shortest -->
    <rect x="-18" y="-8" width="8" height="20" fill="white" rx="2"/>
    <!-- Bar 2 - medium -->
    <rect x="-6" y="-16" width="8" height="28" fill="white" rx="2"/>
    <!-- Bar 3 - tallest -->
    <rect x="6" y="-24" width="8" height="36" fill="white" rx="2"/>
    <!-- Upward arrow -->
    <path d="M 18 -16 L 22 -8 L 20 -6 L 18 -4 Z" fill="white"/>
  </g>
  
  <!-- Overlap connection (subtle line) -->
  <line x1="130" y1="115" x2="150" y2="130" stroke="#6b7280" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Text label (optional - comment out if not needed) -->
  <!-- <text x="128" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1f2937">Poradnia Manager</text> -->
</svg>
